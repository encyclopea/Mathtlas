<h2><strong><span class="texhtml mvar">Circle</span></strong></h2>
<p><strong><span class="texhtml mvar">Definition:&nbsp;</span></strong><span class="texhtml mvar">A circle is a shape where all points are equally distant from a center. The distance across from it is called diameter, and the distance from the center is called the&nbsp;<a href="elementary_geometry/radius.html">radius</a>.</span></p>
