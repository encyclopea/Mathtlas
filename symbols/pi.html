<h1><strong><span class="texhtml mvar">Mathtlas</span></strong></h1>
<h2><strong><span class="texhtml mvar">Pi (&pi;)<br /></span></strong></h2>
<hr />
<p>&nbsp;</p>
<p><strong><span class="texhtml mvar">Definition:&nbsp;</span></strong><span class="texhtml mvar">Pi (&pi;) is the ratio of a circle's <a href="concepts/circumference.html">circumference </a>to its&nbsp;<a href="concepts/diameter.html">diameter</a>. It is an&nbsp;<a href="concepts/irrational_number..html">irrational number</a>,&nbsp;while <a href="concepts/fractions.html">fractions </a>like <sup>22</sup>&frasl;<sub>7</sub>&nbsp;can approximate it it is not the exact number.</span></p>
<p>&nbsp;</p>
