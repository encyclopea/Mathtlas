<hr />
<p>&nbsp;</p>
<p><strong><span class="texhtml mvar">Definition:&nbsp;</span></strong><span class="texhtml mvar">Pi (&pi;) is the ratio of a circle's circumference to its diameter. It is an&nbsp;<a href="concepts/irrational_number..html">irrational number</a>,&nbsp;while fractions like <sup>22</sup>&frasl;<sub>7</sub>&nbsp;can approximate it it is not the exact number.</span></p>
