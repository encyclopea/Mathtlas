<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathAtlas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>MathAtlas</h1>
        <p>An interactive map of mathematical knowledge</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a> |
        <a href="algebra/quadratic-formula.html">Algebra</a> |
        <a href="geometry/pythagorean-theorem.html">Geometry</a> |
        <a href="symbols/pi.html">Symbols</a>
    </nav>

    <!-- Search bar -->
    <section id="search-section">
        <input type="text" id="searchBox" placeholder="Search formulas, theorems, or symbols...">
        <button onclick="search()">Search</button>
    </section>

    <!-- Main content -->
    <main>
        <h2>Welcome to MathAtlas</h2>
        <p>Explore formulas, concepts, and symbols, all organized into categories. Click a category above or search for a topic to get started.</p>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Encyclopea | MathAtlas</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Basic search functionality
        function search() {
            const input = document.getElementById("searchBox").value.toLowerCase();

            if (input.includes("quadratic") || input.includes("algebra")) {
                window.location.href = "algebra/quadratic-formula.html";
            } else if (input.includes("pythagorean") || input.includes("geometry")) {
                window.location.href = "geometry/pythagorean-theorem.html";
            } else if (input.includes("pi") || input.includes("symbol")) {
                window.location.href = "symbols/pi.html";
            } else {
                alert("No results found.");
            }
        }
    </script>
</body>
</html>
